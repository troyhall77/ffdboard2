name: Daily data refresh

on:
  # 11:00 UTC every day ≈ 6-7am US Eastern (UTC doesn't shift for daylight
  # saving, so this drifts by an hour across the DST change -- harmless for a
  # morning refresh). Lands after overnight news and Wednesday waiver runs.
  schedule:
    - cron: '0 11 * * *'
  # Lets you trigger a run by hand from the Actions tab -- use this to test.
  workflow_dispatch: {}

# The job commits refreshed data back to the repo, so it needs write access.
permissions:
  contents: write

# Shared with the weekly workflow so the two never push at the same time.
concurrency:
  group: data-writes
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - run: python -m pip install -r requirements.txt

      - name: Fetch data and simulate
        env:
          LEAGUE_ID: ${{ vars.LEAGUE_ID }}
          SEASON: ${{ vars.SEASON }}
          ESPN_S2: ${{ secrets.ESPN_S2 }}
          SWID: ${{ secrets.SWID }}
        run: |
          python scripts/fetch_crosswalk.py
          python scripts/fetch_projections.py
          python scripts/fetch_league.py
          python scripts/simulate_projections.py

      - name: Commit refreshed data
        # always() runs this even if a step failed, so data that DID refresh
        # still gets saved while the job still reports failure so you're notified.
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily data refresh [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi